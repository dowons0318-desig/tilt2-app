<!DOCTYPE html>
<html lang='ko'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Safety Section Assessment - GitHub Ready</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f6f8;margin:0;padding:20px}.wrap{max-width:1500px;margin:auto;background:#fff;padding:24px;border-radius:18px;height:100vh;overflow-y:auto;overflow-x:hidden}.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start}.card{border:1px solid #ddd;border-radius:14px;padding:16px}.sync{height:470px;display:flex;flex-direction:column}.collapsed{height:auto!important}.full{grid-column:1/span 2}h1{margin-top:0}.head{display:flex;gap:6px;align-items:center}.head h3{margin:0;flex:1}label{display:block;font-weight:700;margin:8px 0 4px}input,select{width:100%;padding:8px;border:1px solid #ccc;border-radius:8px;box-sizing:border-box}.inline{display:flex;flex-wrap:wrap;gap:8px;align-items:end}.box{width:92px}.btn{padding:8px 12px;border:none;border-radius:8px;background:#0b57d0;color:#fff;cursor:pointer;margin-top:10px}.btn2{background:#198754}.toggle{background:#6c757d;color:#fff;border:none;border-radius:6px;padding:4px 8px;cursor:pointer}.red{background:#dc3545}.body{flex:1;overflow:auto}.list{font-size:14px;line-height:1.7}.item{padding:6px;border-radius:8px;margin-bottom:4px}.active{background:#fff3cd}.hidden{display:none}.table{width:100%;border-collapse:collapse}.table th,.table td{border:1px solid #999;padding:6px;text-align:center}.table th{background:#eee}
@media (max-width:768px){body{padding:10px}.wrap{padding:12px}.grid{grid-template-columns:1fr}.full{grid-column:auto}.sync{height:auto}.head{flex-wrap:wrap}.head h3{width:100%;margin-bottom:6px}.toggle,.btn{padding:10px 12px}.inline{gap:6px}.box{width:calc(50% - 6px)}input,select{font-size:16px}.table{font-size:12px;display:block;overflow-x:auto;white-space:nowrap}}
</style><meta name='theme-color' content='#0b57d0'>
<meta name='description' content='안전진단 단면조사 상태평가 웹앱'>
</head><body>
<div class='wrap'><h1>안전진단 단면조사 상태평가</h1>
<div class='grid'>
<div class='card full'><div class='head'><h3>1단계 : DATA 입력</h3><button class='toggle' onclick="toggle('sec1')">▼</button></div><div id='sec1'>
<label>건물명</label><input id='building' value='엔진12공장'>
<label>구조형식</label><select id='stype' onchange='loadShapes()'><option>RC</option><option>STEEL</option></select>
<label>부재명</label><input id='mname' value='SC1'>
<label>부재형상</label><select id='shape' onchange='renderDesign()'></select>
<label>설계도서 부재사이즈</label><div id='designArea' class='inline'></div>
<button class='btn' onclick='saveMember()'>부재 저장</button></div></div>
<div class='card sync'><div class='head'><h3>2단계 : 현장 조사 입력</h3><button class='toggle' onclick="toggle('sec2')">▼</button></div><div id='sec2' class='body'>
<label>조사번호</label><input id='survey'>
<label>조사 부재명</label><select id='sel' onchange='loadSurvey()'></select>
<label>조사위치</label><input id='loc' value='6 / C1'>
<label>설계도면 치수</label><input id='designView' readonly>
<label>실측결과</label><div id='measureArea' class='inline'></div>
<button class='btn btn2' onclick='analyze()'>해석</button></div></div>
<div class='card sync'><div class='head'><h3>부재 LIST</h3><button class='toggle' onclick="toggle('listSec')">▼</button><button class='toggle red' onclick='resetMembers()'>초기화</button></div><div id='listSec' class='body'><div id='sideInfo' class='list'>부재 없음</div></div></div>
<div class='card full sync'><div class='head'><h3>해석 결과</h3><button class='toggle' onclick="toggle('sec3')">▼</button><button class='toggle red' onclick='resetResults()'>초기화</button></div><div id='sec3' class='body'><table class='table' id='result'></table></div></div>
</div></div>
<script>
let db=JSON.parse(localStorage.getItem('db')||'{}');let results=JSON.parse(localStorage.getItem('results')||'[]');const used=new Set(JSON.parse(localStorage.getItem('used')||'[]'));
function save(){localStorage.setItem('db',JSON.stringify(db));localStorage.setItem('results',JSON.stringify(results));localStorage.setItem('used',JSON.stringify([...used]));}
function toggle(id){const el=document.getElementById(id);const card=el.closest('.card');el.classList.toggle('hidden');if(card.classList.contains('sync')) card.classList.toggle('collapsed');}
function shapes(){return stype.value==='RC'?['□','○']:['H','ㄷ','2LS','L','□','○'];}
function fields(s,t){if(s==='H'||s==='ㄷ')return['높이','폭','웨브','플랜지'];if(s==='2LS')return['높이','폭','두께','간격'];if(s==='L')return['높이','폭','두께'];if(s==='□')return t==='RC'?['가로','세로']:['높이','폭','두께'];if(s==='○')return t==='RC'?['반지름']:['지름','두께'];return[];}
function boxes(id,n,c){document.getElementById(id).innerHTML=n.map(x=>`<div class='box'><label>${x}</label><input class='${c}' inputmode='decimal' pattern='[0-9]*[.]?[0-9]*'></div>`).join('');}
function loadShapes(){shape.innerHTML=shapes().map(x=>`<option>${x}</option>`).join('');renderDesign();}
function renderDesign(){boxes('designArea',fields(shape.value,stype.value),'d');}
function renderMeasure(s,t){boxes('measureArea',fields(s,t),'m');}
function vals(c){return [...document.querySelectorAll('.'+c)].map(x=>x.value.trim()).filter(Boolean).join(' x ');}
function saveMember(){const n=mname.value.trim(),v=vals('d');if(!n||!v)return;const y=window.scrollY;db[n]={shape:shape.value,size:v,stype:stype.value};save();drawList();window.scrollTo(0,y);}
function drawList(){sideInfo.innerHTML='';sel.innerHTML='';const keys=Object.keys(db).sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}));for(const k of keys){const it=db[k],sp=it.shape==='○'?'Φ':it.shape;sideInfo.innerHTML+=`<div class='item' id='item-${k}'>${k} (${it.stype}) : ${sp} - ${it.size} <button onclick="deleteMember('${k}')">삭제</button></div>`;sel.innerHTML+=`<option value='${k}'>${k}</option>`;}if(!keys.length)sideInfo.innerHTML='부재 없음';loadSurvey();}
function loadSurvey(){const k=sel.value;if(!db[k])return;const it=db[k],sp=it.shape==='○'?'Φ':it.shape;designView.value=`${sp} - ${it.size}`;renderMeasure(it.shape,it.stype);document.querySelectorAll('.item').forEach(x=>x.classList.remove('active'));const el=document.getElementById('item-'+k);if(el){el.classList.add('active');el.scrollIntoView({behavior:'smooth',block:'center'});}}
function nextNo(){let i=1;while(used.has('MS-'+i))i++;survey.value='MS-'+i;}
function analyze(){const no=survey.value.trim();if(used.has(no)){alert('조사번호 중복');return;}const k=sel.value;if(!db[k])return;const it=db[k],rv=vals('m'),sp=it.shape==='○'?'Φ':it.shape;let d=(it.size.match(/\d+/g)||[]).map(Number),r=(rv.match(/\d+/g)||[]).map(Number),mx=0;for(let i=0;i<Math.min(d.length,r.length);i++)mx=Math.max(mx,Math.abs(d[i]-r[i]));let g='a';if(mx>5)g='b';if(mx>10)g='c';results.push({no,b:building.value,m:k,l:loc.value,d:`${sp} - ${it.size}`,r:`${sp} - ${rv}`,g});used.add(no);save();renderResults();nextNo();}
function renderResults(){results.sort((a,b)=>a.no.localeCompare(b.no,undefined,{numeric:true}));result.innerHTML=`<tr><th>건물명</th><th>조사번호</th><th>부재명</th><th>위치</th><th>설계도면</th><th>실측결과</th><th>평가</th><th>삭제</th></tr>`;for(const x of results){result.innerHTML+=`<tr><td>${x.b}</td><td>${x.no}</td><td>${x.m}</td><td>${x.l}</td><td>${x.d}</td><td>${x.r}</td><td>${x.g}</td><td><button onclick="delResult('${x.no}')">삭제</button></td></tr>`;}}
function delResult(no){results=results.filter(x=>x.no!==no);used.delete(no);save();renderResults();nextNo();}
function deleteMember(k){delete db[k];save();drawList();}
function resetMembers(){if(!confirm('부재 LIST와 결과를 모두 초기화하시겠습니까?'))return;db={};results=[];used.clear();save();drawList();renderResults();nextNo();}
function resetResults(){if(!confirm('결과만 초기화하시겠습니까?'))return;results=[];used.clear();save();renderResults();nextNo();}
loadShapes();drawList();renderResults();nextNo();
</script></body></html>
